services:
  - type: web
    name: docflow-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_render.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docflow-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: docflow-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: docflow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: docflow-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: UPLOAD_DIR
        value: /opt/render/project/src/backend/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 10

  - type: web
    name: docflow-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: keyvalue
    name: docflow-redis
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: docflow-postgres
